<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
  }
  .calculator {
    width: 320px;
    background: #000;
    border-radius: 40px;
    padding: 20px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  }
  .display {
    color: #fff;
    font-size: 72px;
    font-weight: 200;
    text-align: right;
    padding: 40px 20px 20px;
    min-height: 140px;
    overflow: hidden;
    word-wrap: break-word;
    line-height: 1;
  }
  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  button {
    height: 68px;
    border: none;
    border-radius: 50%;
    font-size: 32px;
    font-weight: 400;
    cursor: pointer;
    font-family: inherit;
    transition: filter 0.1s;
    color: #fff;
  }
  button:active { filter: brightness(1.4); }
  .gray { background: #a5a5a5; color: #000; }
  .dark { background: #333; color: #fff; }
  .orange { background: #ff9f0a; color: #fff; }
  .zero {
    grid-column: span 2;
    border-radius: 34px;
    text-align: left;
    padding-left: 28px;
  }
</style>
</head>
<body>
  <div class="calculator">
    <div class="display" id="display">0</div>
    <div class="buttons">
      <button class="gray" data-action="clear">AC</button>
      <button class="gray" data-action="negate">+/−</button>
      <button class="gray" data-action="percent">%</button>
      <button class="orange" data-op="/">÷</button>

      <button class="dark" data-num="7">7</button>
      <button class="dark" data-num="8">8</button>
      <button class="dark" data-num="9">9</button>
      <button class="orange" data-op="*">×</button>

      <button class="dark" data-num="4">4</button>
      <button class="dark" data-num="5">5</button>
      <button class="dark" data-num="6">6</button>
      <button class="orange" data-op="-">−</button>

      <button class="dark" data-num="1">1</button>
      <button class="dark" data-num="2">2</button>
      <button class="dark" data-num="3">3</button>
      <button class="orange" data-op="+">+</button>

      <button class="dark zero" data-num="0">0</button>
      <button class="dark" data-action="decimal">.</button>
      <button class="orange" data-action="equals">=</button>
    </div>
  </div>

<script>
  const display = document.getElementById('display');
  let current = '0';
  let previous = null;
  let operator = null;
  let justEvaluated = false;

  function format(n) {
    if (n === 'Error') return n;
    const num = Number(n);
    if (!isFinite(num)) return 'Error';
    const str = num.toString();
    if (str.length > 9 && !str.includes('e')) {
      return num.toPrecision(9).replace(/\.?0+$/, '');
    }
    return str;
  }

  function render() {
    display.textContent = current.length > 9 && !current.includes('.')
      ? format(current)
      : current;
  }

  function inputNumber(n) {
    if (justEvaluated) { current = '0'; justEvaluated = false; }
    if (current === '0') current = n;
    else if (current.length < 12) current += n;
    render();
  }

  function inputDecimal() {
    if (justEvaluated) { current = '0'; justEvaluated = false; }
    if (!current.includes('.')) current += '.';
    render();
  }

  function clearAll() {
    current = '0'; previous = null; operator = null; justEvaluated = false;
    render();
  }

  function negate() {
    if (current === '0') return;
    current = current.startsWith('-') ? current.slice(1) : '-' + current;
    render();
  }

  function percent() {
    current = format(parseFloat(current) / 100);
    render();
  }

  function compute(a, b, op) {
    a = parseFloat(a); b = parseFloat(b);
    switch (op) {
      case '+': return a + b;
      case '-': return a - b;
      case '*': return a * b;
      case '/': return b === 0 ? 'Error' : a / b;
    }
  }

  function setOperator(op) {
    if (operator && previous !== null && !justEvaluated) {
      const result = compute(previous, current, operator);
      current = format(result);
      render();
      previous = current;
    } else {
      previous = current;
    }
    operator = op;
    justEvaluated = true;
  }

  function equals() {
    if (operator === null || previous === null) return;
    const result = compute(previous, current, operator);
    current = format(result);
    previous = null;
    operator = null;
    justEvaluated = true;
    render();
  }

  document.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.num !== undefined) inputNumber(btn.dataset.num);
      else if (btn.dataset.op !== undefined) setOperator(btn.dataset.op);
      else switch (btn.dataset.action) {
        case 'clear': clearAll(); break;
        case 'negate': negate(); break;
        case 'percent': percent(); break;
        case 'decimal': inputDecimal(); break;
        case 'equals': equals(); break;
      }
    });
  });
</script>
</body>
</html>
